<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg12" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="50%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <filter id="glow12">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip12"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#9c27b0" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring12)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg12)"/>
  <!-- Stars -->
  <g clip-path="url(#clip12)">
    <circle cx="18.3" cy="14.2" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="160.7" cy="105.0" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="123.1" cy="15.8" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="85.4" cy="106.6" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="47.8" cy="17.4" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="10.2" cy="108.2" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="152.5" cy="19.0" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="114.9" cy="109.7" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="77.3" cy="20.5" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="39.6" cy="111.3" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="182.0" cy="22.1" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="144.4" cy="112.9" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="gal12" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="60%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="100" rx="21" ry="4" fill="#9c27b0" opacity="0.19" transform="rotate(0,100,100)"/>
  <ellipse cx="100" cy="100" rx="21" ry="4" fill="#9c27b0" opacity="0.19" transform="rotate(72,100,100)"/>
  <ellipse cx="100" cy="100" rx="21" ry="4" fill="#9c27b0" opacity="0.19" transform="rotate(144,100,100)"/>
  <ellipse cx="100" cy="100" rx="21" ry="4" fill="#9c27b0" opacity="0.19" transform="rotate(216,100,100)"/>
  <ellipse cx="100" cy="100" rx="21" ry="4" fill="#9c27b0" opacity="0.19" transform="rotate(288,100,100)"/>
  
  <circle cx="100" cy="100" r="29" fill="url(#gal12)" filter="url(#glow12)"/>
  <circle cx="100" cy="100" r="11" fill="#ce93d8" opacity="0.6"/>
  <circle cx="100" cy="100" r="5" fill="white" opacity="0.9"/>
  
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#e1bee7" letter-spacing="1">GALAXY 1</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">>1.000 pts</text>
</svg>