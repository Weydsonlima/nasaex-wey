<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg15" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa000"/>
      <stop offset="50%" stop-color="#ffcc02"/>
      <stop offset="100%" stop-color="#ffa000"/>
    </linearGradient>
    <filter id="glow15">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip15"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ffa000" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring15)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg15)"/>
  <!-- Stars -->
  <g clip-path="url(#clip15)">
    <circle cx="20.0" cy="15.2" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="162.4" cy="105.9" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="124.7" cy="16.7" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="87.1" cy="107.5" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="49.5" cy="18.3" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="11.8" cy="109.1" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="154.2" cy="19.9" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="116.6" cy="110.7" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="78.9" cy="21.4" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="41.3" cy="112.2" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="183.7" cy="23.0" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="146.1" cy="113.8" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="gal15" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b5860d"/>
      <stop offset="60%" stop-color="#4e2b00"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(0,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(40,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(80,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(120,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(160,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(200,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(240,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(280,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff9800" opacity="0.27" transform="rotate(320,100,100)"/>
  
