<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg16" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8f00"/>
      <stop offset="50%" stop-color="#ffd740"/>
      <stop offset="100%" stop-color="#ff8f00"/>
    </linearGradient>
    <filter id="glow16">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip16"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ff8f00" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring16)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg16)"/>
  <!-- Stars -->
  <g clip-path="url(#clip16)">
    <circle cx="20.6" cy="15.5" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="162.9" cy="106.3" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="125.3" cy="17.0" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="87.7" cy="107.8" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="50.0" cy="18.6" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="12.4" cy="109.4" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="154.8" cy="20.2" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="117.1" cy="111.0" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="79.5" cy="21.7" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="41.9" cy="112.5" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="184.2" cy="23.3" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="146.6" cy="114.1" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="gal16" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c77b00"/>
      <stop offset="60%" stop-color="#5a3000"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
  </defs>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(0,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(40,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(80,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(120,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(160,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(200,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(240,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(280,100,100)"/>
  <ellipse cx="100" cy="100" rx="27" ry="6" fill="#ff8f00" opacity="0.27" transform="rotate(320,100,100)"/>
  
  <circle cx="100" cy="100" r="31" fill="url(#gal16)" filter="url(#glow16)"/>
  <circle cx="100" cy="100" r="13" fill="#ffca28" opacity="0.6"/>
  <circle cx="100" cy="100" r="6" fill="white" opacity="0.9"/>
  <circle cx="115" cy="112" r="2" fill="#fff9c4" opacity="0.8"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#fff8e1" letter-spacing="1">GALAXY 5</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">>10.000 pts</text>
</svg>