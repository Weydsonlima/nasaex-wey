<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg6" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7043"/>
      <stop offset="50%" stop-color="#bf360c"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip6"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ff7043" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring6)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg6)"/>
  <!-- Stars -->
  <g clip-path="url(#clip6)">
    <circle cx="15.0" cy="12.4" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="157.3" cy="103.2" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="119.7" cy="14.0" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="82.1" cy="104.8" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="44.4" cy="15.5" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="186.8" cy="106.3" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="149.2" cy="17.1" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="111.5" cy="107.9" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="73.9" cy="18.7" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="36.3" cy="109.5" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="178.6" cy="20.3" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="141.0" cy="111.0" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="jup6" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffcc80"/><stop offset="100%" stop-color="#bf360c"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="40" fill="url(#jup6)" filter="url(#glow6)"/>
  <ellipse cx="100" cy="86" rx="38" ry="5" fill="#8d6e63" opacity="0.55"/>
  <ellipse cx="100" cy="96" rx="38" ry="4" fill="#ffb74d" opacity="0.4"/>
  <ellipse cx="100" cy="106" rx="38" ry="5" fill="#795548" opacity="0.5"/>
  <ellipse cx="100" cy="116" rx="36" ry="4" fill="#ff8a65" opacity="0.4"/>
  <ellipse cx="84" cy="106" rx="6" ry="4.5" fill="#e53935" opacity="0.75"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#fbe9e7" letter-spacing="1">JÚPITER</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">500 pts</text>
</svg>