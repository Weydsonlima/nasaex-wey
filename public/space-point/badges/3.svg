<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="50%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#ef5350"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip3"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ef5350" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring3)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg3)"/>
  <!-- Stars -->
  <g clip-path="url(#clip3)">
    <circle cx="13.3" cy="11.5" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="155.7" cy="102.3" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="118.0" cy="13.1" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="80.4" cy="103.8" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="42.8" cy="14.6" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="185.1" cy="105.4" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="147.5" cy="16.2" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="109.9" cy="107.0" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="72.2" cy="17.8" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="34.6" cy="108.5" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="177.0" cy="19.3" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="139.3" cy="110.1" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="mars3" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ef5350"/><stop offset="100%" stop-color="#7f0000"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="40" fill="url(#mars3)" filter="url(#glow3)"/>
  <ellipse cx="100" cy="63" rx="16" ry="4" fill="white" opacity="0.35"/>
  <ellipse cx="100" cy="137" rx="12" ry="3" fill="#ffccbc" opacity="0.3"/>
  <ellipse cx="85" cy="100" rx="18" ry="8" fill="#c62828" opacity="0.4"/>
  <ellipse cx="112" cy="110" rx="10" ry="5" fill="#b71c1c" opacity="0.35"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#ffcdd2" letter-spacing="1">MARTE</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">200 pts</text>
</svg>