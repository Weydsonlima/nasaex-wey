  <circle cx="100" cy="100" r="13" fill="#ffd54f" opacity="0.6"/>
  <circle cx="100" cy="100" r="6" fill="white" opacity="0.9"/>
  <circle cx="85" cy="88" r="2.5" fill="#ffe082" opacity="0.8"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#fff3cd" letter-spacing="1">GALAXY 4</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">>7.500 pts</text>
</svg>