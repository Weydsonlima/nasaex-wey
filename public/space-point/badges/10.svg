<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg10" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bdbdbd"/>
      <stop offset="50%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </linearGradient>
    <filter id="glow10">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip10"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#bdbdbd" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring10)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg10)"/>
  <!-- Stars -->
  <g clip-path="url(#clip10)">
    <circle cx="17.2" cy="13.6" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="159.6" cy="104.4" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="121.9" cy="15.2" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="84.3" cy="106.0" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="46.7" cy="16.8" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="189.0" cy="107.6" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="151.4" cy="18.3" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="113.8" cy="109.1" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="76.1" cy="19.9" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="38.5" cy="110.7" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="180.9" cy="21.5" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="143.3" cy="112.3" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="mer10" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#bdbdbd"/><stop offset="100%" stop-color="#424242"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="40" fill="url(#mer10)" filter="url(#glow10)"/>
  <circle cx="88" cy="86" r="7" fill="#616161" opacity="0.55"/>
  <circle cx="114" cy="95" r="5" fill="#757575" opacity="0.5"/>
  <circle cx="93" cy="116" r="6" fill="#616161" opacity="0.5"/>
  <circle cx="108" cy="112" r="4" fill="#757575" opacity="0.45"/>
  <circle cx="78" cy="108" r="3" fill="#9e9e9e" opacity="0.4"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#f5f5f5" letter-spacing="1">MERCÚRIO</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">900 pts</text>
</svg>