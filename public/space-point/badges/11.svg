<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg11" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="50%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#ffd600"/>
    </linearGradient>
    <filter id="glow11">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip11"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ffd600" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring11)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg11)"/>
  <!-- Stars -->
  <g clip-path="url(#clip11)">
    <circle cx="17.8" cy="13.9" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="160.1" cy="104.7" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="122.5" cy="15.5" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="84.9" cy="106.3" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="47.2" cy="17.1" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="189.6" cy="107.9" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="152.0" cy="18.6" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="114.3" cy="109.4" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="76.7" cy="20.2" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="39.1" cy="111.0" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="181.4" cy="21.8" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="143.8" cy="112.6" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="sun11" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
  </defs>
  <!-- Corona rays -->
  <g opacity="0.35">
    <line x1="100" y1="52" x2="100" y2="44" stroke="#ffd600" stroke-width="2.5"/>
    <line x1="100" y1="148" x2="100" y2="156" stroke="#ffd600" stroke-width="2.5"/>
    <line x1="52" y1="100" x2="44" y2="100" stroke="#ffd600" stroke-width="2.5"/>
    <line x1="148" y1="100" x2="156" y2="100" stroke="#ffd600" stroke-width="2.5"/>
    <line x1="65" y1="65" x2="59" y2="59" stroke="#ffd600" stroke-width="2"/>
    <line x1="135" y1="65" x2="141" y2="59" stroke="#ffd600" stroke-width="2"/>
    <line x1="65" y1="135" x2="59" y2="141" stroke="#ffd600" stroke-width="2"/>
    <line x1="135" y1="135" x2="141" y2="141" stroke="#ffd600" stroke-width="2"/>
  </g>
  <circle cx="100" cy="100" r="38" fill="#ff6f00" opacity="0.3" filter="url(#glow11)"/>
  <circle cx="100" cy="100" r="34" fill="url(#sun11)" filter="url(#glow11)"/>
  <circle cx="88" cy="90" r="5" fill="#fff176" opacity="0.5"/>
  <circle cx="106" cy="95" r="7" fill="#ffe57f" opacity="0.4"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#fff9c4" letter-spacing="1">SOL</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">1.000 pts</text>
</svg>