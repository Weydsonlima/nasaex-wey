<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip1"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring1)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg1)"/>
  <!-- Stars -->
  <g clip-path="url(#clip1)">
    <circle cx="12.2" cy="10.9" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="154.5" cy="101.7" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="116.9" cy="12.4" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="79.3" cy="103.2" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="41.6" cy="14.0" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="184.0" cy="104.8" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="146.4" cy="15.6" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="108.7" cy="106.4" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="71.1" cy="17.1" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="33.5" cy="107.9" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="175.8" cy="18.7" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="138.2" cy="109.5" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="earth1" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4fc3f7"/><stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="40" fill="url(#earth1)" filter="url(#glow1)"/>
  <ellipse cx="88" cy="92" rx="10" ry="14" fill="#2e7d32" opacity="0.85"/>
  <ellipse cx="108" cy="105" rx="8" ry="11" fill="#388e3c" opacity="0.8"/>
  <ellipse cx="97" cy="115" rx="6" ry="5" fill="#2e7d32" opacity="0.75"/>
  <ellipse cx="82" cy="108" rx="4" ry="6" fill="#1b5e20" opacity="0.7"/>
  <ellipse cx="100" cy="63" rx="18" ry="4" fill="white" opacity="0.25"/>
  <ellipse cx="100" cy="137" rx="16" ry="3.5" fill="white" opacity="0.2"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#b3e5fc" letter-spacing="1">TERRA</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">< 100 pts</text>
</svg>