<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg9" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0a3d"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="ring9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c6bc0"/>
      <stop offset="50%" stop-color="#0d1b6e"/>
      <stop offset="100%" stop-color="#5c6bc0"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip9"><circle cx="100" cy="100" r="88"/></clipPath>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#5c6bc0" stroke-width="1" opacity="0.3"/>
  <!-- Main ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#ring9)" stroke-width="6"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="88" fill="url(#bg9)"/>
  <!-- Stars -->
  <g clip-path="url(#clip9)">
    <circle cx="16.6" cy="13.3" r="0.8" fill="white" opacity="0.20"/>
    <circle cx="159.0" cy="104.1" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="121.4" cy="14.9" r="0.5" fill="white" opacity="0.32"/>
    <circle cx="83.7" cy="105.7" r="0.8" fill="white" opacity="0.38"/>
    <circle cx="46.1" cy="16.5" r="0.5" fill="white" opacity="0.44"/>
    <circle cx="188.5" cy="107.2" r="0.5" fill="white" opacity="0.50"/>
    <circle cx="150.9" cy="18.0" r="0.8" fill="white" opacity="0.56"/>
    <circle cx="113.2" cy="108.8" r="0.5" fill="white" opacity="0.20"/>
    <circle cx="75.6" cy="19.6" r="0.5" fill="white" opacity="0.26"/>
    <circle cx="38.0" cy="110.4" r="0.8" fill="white" opacity="0.32"/>
    <circle cx="180.3" cy="21.2" r="0.5" fill="white" opacity="0.38"/>
    <circle cx="142.7" cy="112.0" r="0.5" fill="white" opacity="0.44"/>
  </g>
  <!-- Planet -->
  
  <defs>
    <radialGradient id="nep9" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#5c6bc0"/><stop offset="100%" stop-color="#0d1b6e"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="40" fill="url(#nep9)" filter="url(#glow9)"/>
  <ellipse cx="100" cy="92" rx="30" ry="5" fill="#3949ab" opacity="0.45"/>
  <ellipse cx="100" cy="104" rx="28" ry="4" fill="#283593" opacity="0.4"/>
  <ellipse cx="83" cy="97" rx="8" ry="6" fill="#1a237e" opacity="0.6"/>
  <ellipse cx="83" cy="97" rx="5" ry="3.5" fill="#c5cae9" opacity="0.2"/>
  <!-- Name label -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#c5cae9" letter-spacing="1">NETUNO</text>
  <text x="100" y="173" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#7a5fc0">800 pts</text>
</svg>